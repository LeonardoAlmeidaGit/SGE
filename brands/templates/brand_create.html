{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <hr3 class="display-6">Cadastrar Marca</hr3>

    <div class="card">
        <div class="card-body">
            <form method="post" class="form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Salvar Marca</button>
            </form>
        </div>
    </div>
    <a href="{% url 'brand_list' %}" class="btn btn-secondary mt-3">Cancelar</a>
</div>

{% endblock %}
